name: ci

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/AiTranslator.slnx

      - name: Build
        run: dotnet build src/AiTranslator.slnx -c Debug --no-restore

      - name: Test
        run: dotnet test src/AiTranslator.slnx -c Debug --no-build
