# OpenAI provider secrets — DEVELOPMENT ONLY.
# Copy this file to `openai.secrets.toml` (same folder) and fill in real values.
# The real file is git-ignored. The released app reads the key from Windows Credential
# Manager instead — see docs/architecture/decision-records/0005-secret-storage-credential-manager.md.

[openai]
# Personal OpenAI API key (starts with "sk-..."). Used only when running in DEBUG.
OPENAI_API_KEY = "sk-REPLACE_ME"

# Optional: override the OpenAI org/project if your key needs it.
# OPENAI_ORG_ID = ""
# OPENAI_PROJECT_ID = ""
